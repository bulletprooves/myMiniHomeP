<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>동근_Green Effect</title>
  <link rel="stylesheet" href="../css/subCSS.css">
  <script src="../js/projectSidebar.js" defer></script>
</head>

<body>


  <main>
    <div id="project-sidebar"></div>

    <header class="page-header" style="background-image: url('../images/Green_jpg.jpg');">
      <div class="header-content">
        <h1 class="neon">Green Effect</h1>
        <p></p>
      </div>
    </header>
    <!-- 섹션 1: 이미지 왼쪽, 텍스트 오른쪽 -->
    
    <section class="section">
      <div class="text">
        <div class="video-container">
          <div class="video-bg" style="padding-bottom: 20rem;">
            <iframe src="https://www.youtube.com/embed/ZL1ppxvRTgk?autoplay=1&mute=0&loop=1&playlist=ZL1ppxvRTgk"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </div>
      <div class="text">
        <h2 class="highlight">Green Effect</h2>
        <p>KBSC2021 환경보존 어플 프로젝트로 개발한 모바일 게임입니다.<br>
          미니게임 점수에 따라 2가지 엔딩을 제공합니다.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="image">
        <img src="../images/subPages/green01.jpg" alt="Sample Image 1">
      </div>
      <div class="text">
        <h2>미니게임</h2>
        <p>집게발 분리수거 게임<br>
          타이밍 맞춰 나아가는 게임          
        </p>
      </div>
    </section>

    <!-- 섹션 2: 텍스트 왼쪽, 이미지 오른쪽 -->
    <section class="section">
      <div class="image">
        <img src="../images/subPages/green02.jpg" alt="Sample Image 2">
      </div>
      <div class="text">
        <h2> </h2>
        <p>올바른 분리수거 방법과 참고 웹사이트를 제공
        </p>
      </div>
    </section>

    <!-- 섹션 3: 다시 이미지 왼쪽, 텍스트 오른쪽 -->
    <section class="section">
      <div class="image">
        <img src="../images/subPages/green03.jpg" alt="Sample Image 3">
      </div>
      <div class="text">
        <h2>연출</h2>
        <p>분리수거 게임에서 획득한 점수에 따라 북극곰 엔딩이 달라집니다.</p>
      </div>
    </section>
  </main>
</body>

</html>
